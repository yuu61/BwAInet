# r2-gcp (GCP VyOS) フルコンフィグ
#
# 設計判断・解説は ../design/gcp-integration.md を参照。
# 本ファイルは投入用の VyOS CLI コマンド集 (上から順に set/commit/save 可能)。
#
# 役割: BwAI トランジットルーター (大阪リージョン e2-micro)
#   - r1 (自宅) と r3 (会場) の WireGuard ハブ (フルメッシュ補完)
#   - GCP IPv6 /64 (2600:1900:41d1:92::/64) を r3 に配布
#   - GCP プレフィックス向け IPv6 NAT66 (NAT GW 制約回避)
#   - eBGP AS64512、BFD profile FAST、graceful-restart-disable
#
# 注意:
#   <r1-public-key>, <r3-public-key>, <r2-private-key>: WireGuard 鍵
#   <r1-endpoint>: r1 側 WG endpoint (DDNS or 固定 IP)
#   <r3-endpoint>: r3 側 WG endpoint (会場 NAT 越え wstunnel 経由)
#   GCP IPv6 アドレスは GCE の固定 external + internal /96 から払出
# - VyOS バージョン: 2026.03 (Circinus, rolling release)

