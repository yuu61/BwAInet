! sw02 (Cisco ISR 1100 / C1111-8PLTELAWQ, IOS XE 17.15) 投入用フルコンフィグ
!
! 設計判断・解説は ../design/venue-switch2.md を参照。
! 共通設計 (VLAN モデル、ポート種別 T1〜T5) は ../design/venue-switch.md を参照。
! 現場柔軟運用 (Gi 0/1/6-7 の用途切替) も venue-switch2.md を参照。

! ============================================================
! sw02 Configuration (Cisco ISR 1100 / C1111-8PLTELAWQ, IOS XE 17.15)
! ESM ポートのみ使用、WAN ポートは shutdown
! ============================================================

! --- 基本設定 ---
hostname sw02
no ip http server
no ip http secure-server
lldp run

! --- 時刻 (UTC 固定) ---
clock timezone UTC 0
service timestamps log datetime msec show-timezone year
service timestamps debug datetime msec show-timezone year

! --- NTP ---
ntp server 192.168.11.1

! --- syslog (TCP 601 / RFC5424) ---
logging host 192.168.11.2 transport tcp port 601
logging trap informational
logging trap syslog-format rfc5424
logging source-interface Vlan11
logging origin-id hostname
logging buffered 16384 informational

! --- AAA / ローカルユーザー ---
aaa new-model
aaa authentication login default local
username admin privilege 15 secret <PASSWORD>

! --- mgmt ACL (192.168.11.0/24 以外から SSH 拒否) ---
ip access-list extended MGMT-PROTECT
 permit ip 192.168.11.0 0.0.0.255 any
 deny   ip any any log

! --- SNMP (コミュニティ/v3 は現場で設定) ---
! snmp-server community <ro-community> RO
! snmp-server host 192.168.11.2 version 2c <trap-community>
! snmp-server location "BwAI 2026 venue"
! snmp-server contact "netops@example.jp"

! --- VLAN 定義 ---
vlan 11
 name mgmt
vlan 30
 name staff
vlan 40
 name user

! --- 管理 SVI ---
interface Vlan11
 ip address 192.168.11.6 255.255.255.0
 ip access-group MGMT-PROTECT in
 no shutdown
!
interface Vlan30
 no ip address
 no shutdown
!
interface Vlan40
 no ip address
 no shutdown

ip default-gateway 192.168.11.1

! --- RA Guard ---
! スイッチでは RA Guard を設定しない。不正 RA 対策は WLC/AP 側で実施。
! 有線端末からの不正 RA は r3-vyos の IPv6 ファイアウォールで drop。

! ============================================================
! WAN ポート: 未使用 (shutdown)
! ============================================================

interface GigabitEthernet0/0/0
 no ip address
 shutdown
!
interface GigabitEthernet0/0/1
 no ip address
 shutdown

! ============================================================
! ESM ポート
! ============================================================

! Gi 0/1/0-5: Type T2 — AP trunk (FlexConnect、SSID ローカルスイッチング)
interface range GigabitEthernet0/1/0-5
 description AP
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 switchport trunk native vlan 11
 no shutdown

! Gi 0/1/6-7: Flex port — 現場で用途を決定
! デフォルトは trunk + shutdown (native VLAN なし = all tagged)
! T1 用途: no shutdown
! T2 用途: switchport trunk native vlan 11 を追加 + no shutdown
interface range GigabitEthernet0/1/6-7
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 storm-control multicast level 5.00
 shutdown

! Wlan-GigabitEthernet0/1/8: 内蔵 WLAN モジュール (T2 相当)
interface Wlan-GigabitEthernet0/1/8
 description AP
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 switchport trunk native vlan 11
 no shutdown

! ============================================================
! 未使用インタフェース
! ============================================================

interface Cellular0/2/0
 no ip address
 shutdown
!
interface Cellular0/2/1
 no ip address
 shutdown

! --- SSH ---
ip ssh version 2
line vty 0 4
 transport input ssh
 login local
 exec-timeout 10 0
line vty 5 14
 transport input ssh
 login local
 exec-timeout 10 0
line con 0
 exec-timeout 10 0
 login local

end
