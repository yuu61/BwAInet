# 設計判断・解説は ../design/venue-vyos.md を参照。
# 本ファイルは投入用の VyOS CLI コマンド集 (上から順に set/commit/save 可能)。
#
# `<placeholder>` は環境依存値:
#   <r1-public-key>, <r3-private-key>, <r2-public-key>: WireGuard 鍵
#   <自宅グローバルIP>, <自宅FQDN>: WG endpoint / wstunnel 接続先
