! sw01 (FS スイッチ) 投入用フルコンフィグ
!
! 設計判断・解説は ../design/venue-switch1.md を参照。
! 共通設計 (VLAN モデル、ポート種別 T1〜T5) は ../design/venue-switch.md を参照。

! ============================================================
! sw01 Configuration (FS switch, Cisco-like CLI)
! 共通設計: venue-switch.md を参照
! ============================================================

! --- 基本設定 ---
hostname sw01
no ip domain-lookup

! --- 時刻 (UTC 固定) ---
clock timezone UTC 0
service timestamps log datetime msec show-timezone year
service timestamps debug datetime msec show-timezone year

! --- NTP ---
ntp server 192.168.11.1

! --- syslog (UDP 514) ---
logging host 192.168.11.2
logging trap informational
logging source-interface Vlan11
logging origin-id hostname
logging buffered 16384 informational

! --- AAA / ローカルユーザー ---
aaa new-model
aaa authentication login default local
username admin privilege 15 secret <PASSWORD>

! --- mgmt ACL (192.168.11.0/24 以外から SSH 拒否) ---
ip access-list extended MGMT-PROTECT
 permit ip 192.168.11.0 0.0.0.255 any
 deny   ip any any log

! --- SNMP (コミュニティ/v3 は現場で設定) ---
! snmp-server community <ro-community> RO
! snmp-server host 192.168.11.2 version 2c <trap-community>
! snmp-server location "BwAI 2026 venue"
! snmp-server contact "netops@example.jp"

! --- VLAN 定義 ---
vlan 11
 name mgmt
vlan 30
 name staff
vlan 40
 name user

! --- 管理インターフェース (T3 相当、SVI) ---
interface vlan 11
 ip address 192.168.11.4 255.255.255.0
 ip access-group MGMT-PROTECT in
 no shutdown

ip default-gateway 192.168.11.1

! --- 未使用 VLAN 1 無効化 ---
interface vlan 1
 shutdown

! ============================================================
! Type T1: Uplink/Downlink Trunk ポート
! ============================================================

! XSGe 0/1: スイッチ間接続 (10G fiber)
interface XSGigabitEthernet 0/1
 description T1-ISL
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 no shutdown

! XSGe 0/2: スイッチ間接続 (10G fiber)
interface XSGigabitEthernet 0/2
 description T1-ISL
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 no shutdown

! 5Ge 0/1: AP (Aironet 3800, mGig)
interface FiveGigabitEthernet 0/1
 description T2-AP-Aironet3800-mGig
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 switchport trunk native vlan 11
 poe enable
 no shutdown

! 5Ge 0/2: Proxmox (r1-home / r3-vyos VM 基盤)
! ※ Proxmox vmbr_trunk は PVID=1 (デフォルト) のため native vlan 11 を設定しない。
!    VLAN 11 は tagged で送受信する (tagged VLAN 11 自力参加設計)。
interface FiveGigabitEthernet 0/2
 description T1-Trunk-Proxmox
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 poe enable
 no shutdown

! ============================================================
! Type T2: AP Trunk ポート (FlexConnect / SSID ローカルスイッチング)
! ============================================================

! Ge 0/3-7: AP (Aironet 3800) — trunk、SSID → VLAN 振り分けは AP 側
interface range GigabitEthernet 0/3-7
 description T2-AP-Aironet3800
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 switchport trunk native vlan 11
 poe enable
 no shutdown

! Ge 0/8: WLC (Cisco 3504) — FlexConnect 制御プレーンのみ
interface GigabitEthernet 0/8
 description T1-Trunk-WLC3504
 switchport mode trunk
 switchport trunk allowed vlan 11,30,40
 no poe enable
 no shutdown

! ============================================================
! Type T3: Endpoint Access ポート
! ============================================================

! Ge 0/9: 運営有線 (配信 PC、スピーカー)
interface GigabitEthernet 0/9
 description T3-Staff-Wired
 switchport mode access
 switchport access vlan 30
 no shutdown

! Ge 0/10: 来場者有線
interface GigabitEthernet 0/10
 description T3-User-Wired
 switchport mode access
 switchport access vlan 40
 no shutdown

! ============================================================
! IPv6 マルチキャスト対策 (共通設計 §7 準拠)
! ============================================================

! --- MLD Snooping ---
! DAD/NS のマルチキャストが全ポートにフラッディングされるのを防止
! L2MC テーブル枯渇対策として必須
ipv6 mld-snooping enable
ipv6 mld-snooping vlan 30
ipv6 mld-snooping vlan 40

! --- RA Guard ---
! スイッチでは RA Guard を設定しない。不正 RA 対策は WLC/AP 側で実施。
! 有線端末からの不正 RA は r3-vyos の IPv6 ファイアウォールで drop。

! --- Storm Control (T3 ポート: マルチキャスト制限) ---
interface GigabitEthernet 0/9
 storm-control multicast 500
interface GigabitEthernet 0/10
 storm-control multicast 500

! --- LLDP (FS FSOS ではデフォルト有効。無効化されている場合のみ) ---
lldp enable

! --- SSH ---
ip ssh version 2
line vty 0 15
 transport input ssh
 login local
 exec-timeout 10 0
line con 0
 exec-timeout 10 0
 login local

end
