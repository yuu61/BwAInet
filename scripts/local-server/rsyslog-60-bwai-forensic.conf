# =============================================================
# BwAI forensic log receiver (CT 200 local-server)
# - 受信: TCP 514 (r1/r2-gcp/r3 からの forensic syslog)
# - ローテ: 時次 (UTC)、ファイル名 <hostname>-YYYY-MM-DDTHHZ.log
# - 保存: /mnt/data/syslog-archive/<facility-or-program>/
# - 保険: all/ に全件コピー
# - 転送: Alloy (192.168.11.6:1514) ← 後日有効化、現在はコメントアウト
# =============================================================

# --- TCP 受信 (VyOS など TCP 対応機器、損失防止優先) ---
module(load="imtcp" MaxSessions="200")
input(type="imtcp" port="514" ruleset="remote_forensic")

# --- UDP 受信 (Cisco SW/AP など TCP 非対応機器のため) ---
module(load="imudp")
input(type="imudp" port="514" ruleset="remote_forensic")

# --- DynaFile キャッシュ (時次ローテ用) ---
global(
  maxMessageSize="64k"
)
$DynaFileCacheSize 200

# --- ログ出力フォーマット (RFC3339 UTC + hostname + tag + msg) ---
template(name="BwAILogFmt" type="string"
  string="%timestamp:::date-rfc3339% %HOSTNAME% %syslogtag%%msg:::sp-if-no-1st-sp%%msg%\n")

# --- ファイル名テンプレート (UTC hourly) ---
template(name="FileConntrack" type="string"
  string="/mnt/data/syslog-archive/conntrack/%HOSTNAME%-%$YEAR%-%$MONTH%-%$DAY%T%$HOUR%Z.log")
template(name="FileNdp" type="string"
  string="/mnt/data/syslog-archive/ndp/%HOSTNAME%-%$YEAR%-%$MONTH%-%$DAY%T%$HOUR%Z.log")
template(name="FileDns" type="string"
  string="/mnt/data/syslog-archive/dns/%HOSTNAME%-%$YEAR%-%$MONTH%-%$DAY%T%$HOUR%Z.log")
template(name="FileDhcp" type="string"
  string="/mnt/data/syslog-archive/dhcp/%HOSTNAME%-%$YEAR%-%$MONTH%-%$DAY%T%$HOUR%Z.log")
template(name="FileAll" type="string"
  string="/mnt/data/syslog-archive/all/%HOSTNAME%-%$YEAR%-%$MONTH%-%$DAY%T%$HOUR%Z.log")

# --- リモート受信用 ruleset ---
ruleset(name="remote_forensic") {
  # 送信元 IP フィルタ: VLAN 11 + WG mesh 10.255.0.0/16 + loopback のみ許可
  # 10.255.0.x (r1-r3 WG), 10.255.2.x (r2-r3 WG), 10.255.255.x (dum0 BGP router-id) など
  if not (
    $fromhost-ip startswith "192.168.11." or
    $fromhost-ip startswith "10.255." or
    $fromhost-ip == "127.0.0.1"
  ) then {
    stop
  }

  # conntrack-nat (r1, r2-gcp から facility local2)
  if $syslogfacility-text == "local2" then {
    action(type="omfile" dynaFile="FileConntrack" template="BwAILogFmt"
           fileOwner="root" fileGroup="adm" fileCreateMode="0640"
           dirOwner="root" dirGroup="adm" dirCreateMode="02750"
           closeTimeout="300")
  }

  # NDP dump (r3 から facility local1)
  if $syslogfacility-text == "local1" then {
    action(type="omfile" dynaFile="FileNdp" template="BwAILogFmt"
           fileOwner="root" fileGroup="adm" fileCreateMode="0640"
           dirOwner="root" dirGroup="adm" dirCreateMode="02750"
           closeTimeout="300")
  }

  # DNS forwarding (r3 pdns-recursor)
  if $programname == "pdns-recursor" or $programname == "pdns_recursor" then {
    action(type="omfile" dynaFile="FileDns" template="BwAILogFmt"
           fileOwner="root" fileGroup="adm" fileCreateMode="0640"
           dirOwner="root" dirGroup="adm" dirCreateMode="02750"
           closeTimeout="300")
  }

  # DHCP (r3 Kea)
  if $programname startswith "kea" then {
    action(type="omfile" dynaFile="FileDhcp" template="BwAILogFmt"
           fileOwner="root" fileGroup="adm" fileCreateMode="0640"
           dirOwner="root" dirGroup="adm" dirCreateMode="02750"
           closeTimeout="300")
  }

  # 保険: 全件を all/ にもコピー (stop なし)
  action(type="omfile" dynaFile="FileAll" template="BwAILogFmt"
         fileOwner="root" fileGroup="adm" fileCreateMode="0640"
         dirOwner="root" dirGroup="adm" dirCreateMode="02750"
         closeTimeout="300")

  # Alloy forward (運用可視化) — RFC 5424 octet-counted framing
  action(type="omfwd" target="192.168.11.6" port="1514" protocol="tcp"
         template="RSYSLOG_SyslogProtocol23Format"
         TCP_Framing="octet-counted"
         action.resumeRetryCount="-1"
         queue.type="linkedList" queue.size="10000"
         queue.filename="alloy_fwd"
         queue.maxDiskSpace="100m"
         queue.saveOnShutdown="on")
}
